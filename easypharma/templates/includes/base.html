<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Easy Pharma{% endblock %}</title>

    <!-- PWA: Manifest & Theme -->
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#1a7a4a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Easy Pharma">
    <link rel="apple-touch-icon" href="/static/img/pwa-icon-192.png">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom Sidebar CSS -->
    <link href="{% static 'css/customecss/sidebar.css' %}" rel="stylesheet">
    
    <link href="{% static 'css/global.css' %}" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body>

    <div class="main-wrapper">
        <!-- Sidebar -->
        {% include 'includes/sidebar.html' %}

        <!-- Page Content -->
        <div id="content">
            <!-- Main Content Block -->
            {% block content %}{% endblock %}
        </div>
    </div>

    <!-- PWA: Offline / Online Status Badge -->
    <div id="epNetworkBadge" style="
        display: none;
        position: fixed;
        bottom: 18px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        background: #1a1a2e;
        color: #fff;
        border-radius: 999px;
        padding: 8px 20px;
        font-size: 13px;
        font-weight: 600;
        font-family: 'Inter', sans-serif;
        box-shadow: 0 4px 20px rgba(0,0,0,0.35);
        align-items: center;
        gap: 8px;
        border: 1.5px solid rgba(255,255,255,0.1);
        transition: opacity 0.3s;
        pointer-events: none;
    ">
      <span id="epNetworkDot" style="width:9px;height:9px;border-radius:50%;display:inline-block;background:#ef4444;"></span>
      <span id="epNetworkText">You are offline — read-only mode</span>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Sidebar Toggle Script -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const toggle = document.getElementById('sidebarToggle');
            const sidebar = document.getElementById('sidebarMenu');
            const content = document.getElementById('content');
            
            if (toggle) {
                toggle.addEventListener('click', function() {
                    sidebar.classList.toggle('collapsed');
                    content.classList.toggle('active');
                });
            }
        });
    </script>
    
    <!-- Global Pharmacy Keyboard Shortcuts (F1 - F10) -->
    <script>
        document.addEventListener('keydown', function(e) {
            const shortcuts = {
                'F1': function() { window.location.href = "{% url 'pos' %}"; },
                'F2': function() { window.location.href = "{% url 'purchase_entry' %}"; },
                'F3': function() { window.location.href = "{% url 'pos_returns' %}"; },
                'F4': function() { window.location.href = "{% url 'patient_wise_sales' %}"; },
                'F5': function() {
                    const ps = document.getElementById('productSearch');
                    if (ps) {
                        ps.focus();
                        ps.select();
                    } else {
                        window.location.href = "{% url 'pos' %}";
                    }
                },
                'F6': function() { window.location.href = "{% url 'product_history' %}"; },
                'F7': function() { window.location.href = "{% url 'daily_sale_report' %}"; },
                'F8': function() { window.location.href = "{% url 'pos' %}?mode=counter"; },
                'F9': function() {
                    const searchInput = document.getElementById('productSearch') || 
                                        document.getElementById('productSearchInput') || 
                                        document.getElementById('searchInput') || 
                                        document.querySelector('input[type="search"]');
                    if (searchInput) {
                        searchInput.focus();
                        searchInput.select();
                    }
                },
                'F10': function() {
                    const headerInput = document.getElementById('patientName') || 
                                        document.getElementById('supplierSelect') ||
                                        document.getElementById('invoiceNumber');
                    if (headerInput) {
                        headerInput.focus();
                        if (headerInput.tagName === 'INPUT') {
                            headerInput.select();
                        }
                    }
                },
                'F12': function() {
                    if (typeof completeOrder === 'function') {
                        completeOrder();
                    } else if (typeof savePurchase === 'function') {
                        savePurchase();
                    }
                }
            };

            if (shortcuts[e.key]) {
                e.preventDefault();
                shortcuts[e.key]();
            }
        });
    </script>

    <!-- Global dynamic input uppercase formatter -->
    <script>
        // 1. Intercept programmatic value assignments globally
        (function() {
            const originalInputDescriptor = Object.getOwnPropertyDescriptor(HTMLInputElement.prototype, 'value');
            const originalTextareaDescriptor = Object.getOwnPropertyDescriptor(HTMLTextAreaElement.prototype, 'value');

            if (originalInputDescriptor && originalInputDescriptor.set) {
                Object.defineProperty(HTMLInputElement.prototype, 'value', {
                    get: function() {
                        return originalInputDescriptor.get.call(this);
                    },
                    set: function(val) {
                        let finalVal = val;
                        const type = this.getAttribute('type');
                        const isExcluded = type && ['password', 'email', 'number', 'checkbox', 'radio', 'file', 'date'].includes(type.toLowerCase());
                        if (!isExcluded && typeof val === 'string') {
                            finalVal = val.toUpperCase();
                        }
                        originalInputDescriptor.set.call(this, finalVal);
                    }
                });
            }

            if (originalTextareaDescriptor && originalTextareaDescriptor.set) {
                Object.defineProperty(HTMLTextAreaElement.prototype, 'value', {
                    get: function() {
                        return originalTextareaDescriptor.get.call(this);
                    },
                    set: function(val) {
                        let finalVal = val;
                        if (typeof val === 'string') {
                            finalVal = val.toUpperCase();
                        }
                        originalTextareaDescriptor.set.call(this, finalVal);
                    }
                });
            }
        })();

        // 2. Intercept typed inputs globally
        document.addEventListener('input', function(e) {
            if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) {
                const type = e.target.getAttribute('type');
                if (type === 'password' || type === 'email' || type === 'number' || type === 'checkbox' || type === 'radio' || type === 'file' || type === 'date') return;
                
                const start = e.target.selectionStart;
                const end = e.target.selectionEnd;
                const upperValue = e.target.value.toUpperCase();
                
                if (e.target.value !== upperValue) {
                    e.target.value = upperValue;
                    if (start !== null && end !== null) {
                        e.target.setSelectionRange(start, end);
                    }
                }
            }
        });
    </script>
    <!-- Auto-collapse sidebar on transactional pages -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const autoCollapseUrlNames = [
            'pos', 'pos_list', 'pos_returns', 'patient_wise_sales', 'prescription_reminders',
            'purchase_entry', 'purchase_list', 'supplier_wise_purchase_report', 'expiry_return',
            'daily_sale_report', 'profit_report', 'bill_wise_profit_report', 'half_yearly_report',
            'gst_report', 'stock_report', 'product_history', 'purchase_analysis',
            'gst_dashboard', 'gst_config', 'gst_filing_list', 'gst_reminder_list', 'gstr3b_report', 'gstr1_report',
            'supplier_payment', 'supplier_ledger'
        ];

        const currentUrlName = "{{ request.resolver_match.url_name }}";
        const sidebar = document.getElementById('sidebarMenu');
        const content = document.getElementById('content');

        if (sidebar && content && autoCollapseUrlNames.includes(currentUrlName)) {
            sidebar.classList.add('collapsed');
            content.classList.add('active');
        }
    });
</script>
    {% block extra_js %}{% endblock %}

    <!-- PWA: Service Worker Registration -->
    <script>
    (function () {
        if (!('serviceWorker' in navigator)) return;

        navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(function (reg) {
                console.log('[PWA] Service Worker registered. Scope:', reg.scope);
            })
            .catch(function (err) {
                console.warn('[PWA] Service Worker registration failed:', err);
            });

        // ── Online / Offline indicator ──────────────────────────────
        var badge = document.getElementById('epNetworkBadge');
        var badgeDot  = document.getElementById('epNetworkDot');
        var badgeText = document.getElementById('epNetworkText');
        var hideTimer = null;

        function showBadge(online) {
            if (!badge) return;
            clearTimeout(hideTimer);
            badge.style.display = 'flex';
            badge.style.opacity = '1';
            if (online) {
                badgeDot.style.background  = '#22c55e';
                badgeText.textContent = '✓ Back online';
                // Auto-hide after 3 s when online
                hideTimer = setTimeout(function () {
                    badge.style.opacity = '0';
                    setTimeout(function () { badge.style.display = 'none'; }, 350);
                }, 3000);
            } else {
                badgeDot.style.background  = '#ef4444';
                badgeText.textContent = '🔴 You are offline — read-only mode';
                // Keep visible while offline
            }
        }

        // Show immediately if already offline
        if (!navigator.onLine) showBadge(false);

        window.addEventListener('offline', function () { showBadge(false); });
        window.addEventListener('online',  function () { showBadge(true); });
    })();
    </script>
</body>
</html>
