<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Easy Pharma{% endblock %}</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom Sidebar CSS -->
    <link href="{% static 'css/customecss/sidebar.css' %}" rel="stylesheet">
    
    <!-- Custom Page CSS -->
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f7f6;
            color: #333;
        }
        .main-wrapper {
            display: flex;
            width: 100%;
            align-items: stretch;
        }
        #content {
            width: calc(100% - 280px);
            padding: 20px;
            min-height: 100vh;
            transition: all 0.3s;
            margin-left: 280px;
        }
        #content.active {
            width: 100%;
            margin-left: 0;
        }
        @media (max-width: 768px) {
            #content {
                width: 100%;
                margin-left: 0;
            }
        }
        /* Chart and Card responsiveness */
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-2px);
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

    <div class="main-wrapper">
        <!-- Sidebar -->
        {% include 'includes/sidebar.html' %}

        <!-- Page Content -->
        <div id="content">
            <!-- Top Navigation (Optional) -->
            <nav class="navbar navbar-expand-lg navbar-light bg-white rounded-3 mb-4 shadow-sm px-3 d-md-none">
                <div class="container-fluid">
                    <span class="navbar-brand fw-bold text-success">Easy Pharma</span>
                    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mobileMenu">
                        <i class="bi bi-list fs-3"></i>
                    </button>
                </div>
            </nav>

            <!-- Main Content Block -->
            {% block content %}{% endblock %}
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Sidebar Toggle Script -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const toggle = document.getElementById('sidebarToggle');
            const sidebar = document.getElementById('sidebarMenu');
            const content = document.getElementById('content');
            
            if (toggle) {
                toggle.addEventListener('click', function() {
                    sidebar.classList.toggle('collapsed');
                    content.classList.toggle('active');
                });
            }
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
