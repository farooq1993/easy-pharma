<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Pharma — Offline Mode</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f8fafc;
            color: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 480px;
            padding: 40px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            margin: 20px;
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: #dc2626;
        }
        p {
            font-size: 1rem;
            color: #64748b;
            line-height: 1.5;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            background: #16a34a;
            color: #ffffff;
            padding: 12px 28px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(22, 163, 74, 0.2);
            transition: all 0.2s ease;
        }
        .btn:hover {
            background: #15803d;
            transform: translateY(-2px);
        }
        .offline-notes {
            margin-top: 30px;
            font-size: 0.85rem;
            color: #94a3b8;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🔌</div>
        <h1>You are Offline</h1>
        <p>It seems you have lost your internet connection. Don't worry, you can still perform Billing and search products in the POS application.</p>
        <a href="/pos/" class="btn">Go to POS Billing</a>
        <div class="offline-notes">
            Transactions made offline will automatically sync with the server once your connection is restored.
        </div>
    </div>
</body>
</html>
