{% extends "includes/base.html" %}
{% load static %}

{% block content %}
<div class="container-fluid">
    <div class="row align-items-center mb-4">
        <div class="col">
            <h2 class="fw-bold mb-0">Add New Product</h2>
            <p class="text-muted small">Fill in the details to add a new medicine to your inventory.</p>
        </div>
        <div class="col-auto">
            <a href="{% url 'all-products' %}" class="btn btn-outline-secondary">
                <i class="fas fa-list me-1"></i> View All Products
            </a>
        </div>
    </div>

    {% include 'includes/messages.html' %}
    
    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
        <div class="card-body p-4 p-md-5">
            <form method="POST">
                {% csrf_token %}
                <div class="row g-4">
                    <!-- Product Name -->
                    <div class="col-md-6">
                        <label for="productName" class="form-label fw-bold small text-uppercase">Product Name *</label>
                        <input type="text" class="form-control py-2" id="productName" name="product_name" placeholder="Enter product name" required>
                    </div>

                    <!-- Product Packing -->
                    <div class="col-md-6">
                        <label for="productPacking" class="form-label fw-bold small text-uppercase">Product Packing</label>
                        <input type="text" class="form-control py-2" id="productPacking" name="product_packing" placeholder="e.g., 10 tablets, 100ml bottle">
                    </div>

                    <!-- Product Type -->
                    <div class="col-md-6">
                        <label for="productType" class="form-label fw-bold small text-uppercase">Product Type</label>
                        <select class="form-select py-2" id="productType" name="product_type">
                            <option value="">Select Product Type</option>
                            {% for type in product_types %}
                                <option value="{{ type.id }}">{{ type.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Product Schedule -->
                    <div class="col-md-6">
                        <label for="productSchedule" class="form-label fw-bold small text-uppercase">Product Schedule</label>
                        <select class="form-select py-2" id="productSchedule" name="product_schedule">
                            <option value="">Select Product Schedule</option>
                            {% for schedule in product_schedules %}
                                <option value="{{ schedule.id }}">{{ schedule.schedule_name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Product Tax -->
                    <div class="col-md-6">
                        <label for="productTax" class="form-label fw-bold small text-uppercase">Product Tax</label>
                        <select class="form-select py-2" id="productTax" name="product_tax">
                            <option value="">Select Product Tax</option>
                            {% for tax in product_taxes %}
                                <option value="{{ tax.id }}">{{ tax.tax_name }} ({{ tax.tax_rate }}%)</option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- HSN Code -->
                    <div class="col-md-6">
                        <label for="productHsnCode" class="form-label fw-bold small text-uppercase">HSN Code *</label>
                        <input type="text" class="form-control py-2" id="productHsnCode" name="product_hsn_code" placeholder="Enter HSN code" required>
                    </div>

                    <!-- Product Content -->
                    <div class="col-md-6">
                        <label for="productContent" class="form-label fw-bold small text-uppercase">Product Content</label>
                        <select class="form-select py-2" id="productContent" name="product_content">
                            <option value="">Select Product Content</option>
                            {% for content in product_contents %}
                                <option value="{{ content.id }}">{{ content.content_name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Product Company -->
                    <div class="col-md-6">
                        <label for="productCompany" class="form-label fw-bold small text-uppercase">Product Company</label>
                        <select class="form-select py-2" id="productCompany" name="compny_name">
                            <option value="">Select Product Company</option>
                            {% for company in drug_companies %}
                                <option value="{{ company.id }}">{{ company.company_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="mt-5 d-flex gap-2">
                    <button type="submit" class="btn btn-success btn-lg px-5 fw-bold shadow-sm">
                        <i class="fas fa-save me-2"></i> SAVE PRODUCT
                    </button>
                    <button type="reset" class="btn btn-light btn-lg px-4 border">RESET</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
