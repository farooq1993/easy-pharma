{% extends "includes/base.html" %}
{% block content %}
<div class="container-fluid py-4">
    <div class="card border-0 shadow-sm rounded-4 col-md-6">
        <div class="card-header bg-white border-0 py-3">
            <h5 class="fw-bold mb-0"><i class="bi bi-printer me-2"></i>Printing Setup</h5>
        </div>
        <div class="card-body">
            <div class="mb-4">
                <label class="form-label fw-bold small">Default Bill Header</label>
                <textarea class="form-control bg-light border-0" rows="3">{{ request.tenant.pharmacy_name }}&#10;{{ request.tenant.address }}</textarea>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold small">Thermal Printer Width</label>
                <select class="form-select bg-light border-0">
                    <option value="80">80mm (Standard)</option>
                    <option value="58">58mm</option>
                    <option value="a4">A4 (Laser)</option>
                </select>
            </div>
            <button class="btn btn-primary px-4 rounded-pill">Save Configuration</button>
        </div>
    </div>
</div>
{% endblock %}
