<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
body{
    margin:0;
    padding:0;
}
pre{
    font-family:"Courier New", monospace;
    font-size:12px; 
    font-weight:bold;
    line-height:1.15;
    margin:0;
    padding: 0 0 0 3mm;
    white-space:pre;
}

/* Right align totals */
.totals {
    text-align: right;
    padding-right: 3mm;
    margin-top: 5px;
}

/* Signature Section - Right Aligned */
.signature-section {
    margin-top: 20px;
    padding-right: 3mm;
    text-align: right;
    font-family: "Courier New", monospace;
    font-size: 12px;
}
.signature-line {
    border-top: 1px solid #000;
    width: 220px;
    margin: 8px 0 5px auto;
    display: block;
}

.jurisdiction {
    margin-top: 12px;
    padding-left: 3mm;
    font-family: "Courier New", monospace;
    font-size: 11px;
    font-style: italic;
}

@media print{
    .action-bar{
        display:none !important;
    }
    @page{
        size: 6in 4in landscape;
        margin: 0;
    }
    pre{
        font-size:12px;
    }
}
</style>
</head>
<body>
<div class="action-bar">
    <button onclick="window.print()">Print</button>
</div>
<h2></h2>
<pre>{{ bill_text }}</pre>

<!-- Right aligned totals (if needed separately) -->
<div class="totals">
    <!-- You can also put total lines here if not already in bill_text -->
</div>

<div class="signature-section">
    <strong>Pharmacist Signature</strong><br>
    <div class="signature-line"></div>
</div>

<div class="jurisdiction">
    Subject to Jurisdiction of {{ invoice.tenant.city }}
</div>

</body>
</html>
